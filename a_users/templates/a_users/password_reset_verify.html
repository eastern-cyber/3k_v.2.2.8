{% extends 'layouts/main-layout.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-2 text-center">🔐 เปลี่ยนรหัสผ่าน</h2>
    <p class="text-gray-600 text-center text-sm mb-6">
        กรอกรหัสยืนยันที่ส่งไปทางอีเมล และตั้งรหัสผ่านใหม่
    </p>
    
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %} p-3 rounded mb-4">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">รหัสยืนยัน (6 หลัก)</label>
            <input type="text" name="code" placeholder="000000" 
                   class="input-field w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-2xl"
                   maxlength="6" required>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านใหม่</label>
            <input type="password" name="new_password" placeholder="ตั้งรหัสผ่านใหม่" 
                   class="input-field w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่านใหม่</label>
            <input type="password" name="confirm_password" placeholder="ยืนยันรหัสผ่านใหม่" 
                   class="input-field w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <button type="submit" 
                class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-2 rounded-lg transition">
            เปลี่ยนรหัสผ่าน
        </button>
    </form>
    
    <p class="mt-4 text-center text-sm text-gray-600">
        <a href="{% url 'a_users:password_reset_request' %}" class="text-blue-500 hover:underline">ขอรหัสใหม่</a>
    </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const otpInput = document.querySelector('input[name="code"]');
    if (otpInput) otpInput.focus();
});
</script>
{% endblock %}
