{% extends '_base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">🔐 ลืมรหัสผ่าน</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %} p-3 rounded mb-4">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <p class="text-gray-600 text-sm text-center mb-6">
        กรอกอีเมลที่ใช้ลงทะเบียน เราจะส่งรหัสยืนยันให้คุณ
    </p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
            <input type="email" name="email" placeholder="your@email.com" 
                   class="input-field w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <button type="submit" 
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded-lg transition">
            ส่งรหัสยืนยัน
        </button>
    </form>
    
    <p class="mt-4 text-center text-sm text-gray-600">
        <a href="{% url 'account_login' %}" class="text-blue-500 hover:underline">กลับไปหน้าเข้าสู่ระบบ</a>
    </p>
</div>
{% endblock %}
