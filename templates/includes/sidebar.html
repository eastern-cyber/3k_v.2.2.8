{% load static %}

<style>
/* Mobile hamburger menu styles */
.hamburger-btn {
    display: none;
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1001;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 0;
}

.hamburger-btn .bar {
    display: block;
    width: 22px;
    height: 2.5px;
    background: white;
    border-radius: 2px;
    transition: all 0.3s ease;
}

.hamburger-btn .bar:nth-child(1) {
    transform-origin: top left;
}

.hamburger-btn .bar:nth-child(3) {
    transform-origin: bottom left;
}

.hamburger-btn.active .bar:nth-child(1) {
    transform: rotate(45deg) translate(2px, -1px);
}

.hamburger-btn.active .bar:nth-child(2) {
    opacity: 0;
    transform: scaleX(0);
}

.hamburger-btn.active .bar:nth-child(3) {
    transform: rotate(-45deg) translate(2px, 1px);
}

/* Mobile overlay */
.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 998;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.sidebar-overlay.visible {
    display: block;
    opacity: 1;
}

/* Mobile styles */
@media (max-width: 768px) {
    .hamburger-btn {
        display: flex !important;
    }
    
    .sidebar-container {
        transform: translateX(-100%) !important;
        transition: transform 0.3s ease-in-out !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
        z-index: 999 !important;
        width: 280px !important;
        border-right: 1px solid var(--color-neutral-200) !important;
        background: rgba(0, 0, 0, 0.2) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
    }
    
    .dark .sidebar-container {
        border-right-color: var(--color-neutral-800) !important;
        background: rgba(0, 0, 0, 0.3) !important;
    }
    
    .sidebar-container.open {
        transform: translateX(0) !important;
    }
    
    .sidebar-overlay.visible {
        display: block !important;
        opacity: 1 !important;
    }
    
    /* Fix main content on mobile */
    #main-content {
        padding-left: 0 !important;
        margin-left: 0 !important;
    }
    
    /* Make navigation text white on mobile for better contrast */
    .sidebar-container .button-nav span,
    .sidebar-container .button-nav .size-8 {
        color: white !important;
        fill: white !important;
    }
    
    .sidebar-container .button-nav:hover {
        background: rgba(255, 255, 255, 0.1) !important;
    }
    
    .sidebar-container .button-nav .text-rose-500 {
        color: #f43f5e !important;
        fill: #f43f5e !important;
    }
    
    /* Search button on mobile */
    .sidebar-container #search {
        background: rgba(255, 255, 255, 0.15) !important;
        color: white !important;
    }
    
    .sidebar-container #search .text-neutral-400 {
        color: rgba(255, 255, 255, 0.6) !important;
    }
    
    /* Logo on mobile */
    .sidebar-container #logo img {
        filter: brightness(0) invert(1) !important;
    }
}

@media (min-width: 769px) {
    .hamburger-btn {
        display: none !important;
    }
    .sidebar-overlay {
        display: none !important;
    }
    .sidebar-container {
        transform: translateX(0) !important;
        position: sticky !important;
        top: 0 !important;
        height: 100vh !important;
        overflow-y: auto !important;
        flex-shrink: 0 !important;
        width: 72px !important;
        background: rgba(0, 0, 0, 0.2) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        border-right: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    
    .dark .sidebar-container {
        background: rgba(0, 0, 0, 0.3) !important;
        border-right-color: rgba(255, 255, 255, 0.05) !important;
    }
    
    .sidebar-container.lg\:w-60 {
        width: 240px !important;
    }
    
    /* Desktop navigation text color */
    .sidebar-container .button-nav span {
        color: rgba(255, 255, 255, 0.9) !important;
    }
    
    .sidebar-container .button-nav .size-8 {
        fill: rgba(255, 255, 255, 0.8) !important;
    }
    
    .sidebar-container .button-nav:hover {
        background: rgba(255, 255, 255, 0.1) !important;
    }
    
    .sidebar-container .button-nav .text-rose-500 {
        color: #f43f5e !important;
        fill: #f43f5e !important;
    }
    
    /* Search button on desktop */
    .sidebar-container #search {
        background: rgba(255, 255, 255, 0.15) !important;
        color: white !important;
    }
    
    .sidebar-container #search .text-neutral-400 {
        color: rgba(255, 255, 255, 0.6) !important;
    }
    
    /* Logo on desktop */
    .sidebar-container #logo img {
        filter: brightness(0) invert(1) !important;
    }
    
    /* Footer text on desktop */
    .sidebar-container .py-4 p {
        color: rgba(255, 255, 255, 0.5) !important;
    }
}
</style>

<!-- Hamburger Button -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle navigation">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
</button>

<!-- Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar Container -->
<aside x-data="sidebarComponent()" 
       class="sidebar-container z-20 fixed h-screen w-18 lg:w-60 border-r border-neutral-200 dark:border-neutral-800 lg:border-none transition-all duration-300 ease-in-out" 
       :class="{ '!w-18': showDrawer }"
       id="sidebarContainer">
    <nav class="relative h-full z-10">
        <div id="logo" class="pl-4.5 pt-5 mb-3 w-max">
            <a href="/">
                <div x-show="!darkMode">
                    <img class="hidden lg:block" :class="{ '!hidden': showDrawer }" src="{% static 'images/kokkokkok.png' %}">
                    <img class="block lg:hidden" :class="{ '!block': showDrawer }" src="{% static 'images/icon.png' %}">
                </div>
                <div x-show="darkMode" x-cloak >
                    <img class="hidden lg:block" :class="{ '!hidden': showDrawer }" src="{% static 'images/kokkokkok_dark.png' %}">
                    <img class="block lg:hidden" :class="{ '!block': showDrawer }" src="{% static 'images/icon_dark.png' %}">
                </div>
            </a>
        </div>
        <div class="px-4">
            <button id="search" @click="showDrawer = !showDrawer; showSearch = true" class="w-full h-10 bg-neutral-100 dark:bg-neutral-800 rounded-full pl-2.5 flex items-center cursor-pointer">
                <div class="size-5 flex-shrink-0">
                    <svg viewBox="0 0 48 48">
                        <path d="M21.83 7.5a14.34 14.34 0 1 1 0 28.68 14.34 14.34 0 0 1 0-28.68Zm0-4a18.33 18.33 0 1 0 11.48 32.64l8.9 8.9a1 1 0 0 0 1.42 0l1.4-1.41a1 1 0 0 0 0-1.42l-8.89-8.9A18.34 18.34 0 0 0 21.83 3.5Z"></path>
                    </svg>
                </div>
                <span x-text="searchQuery ? searchQuery : 'ค้นหา'" 
                    class="ml-2 text-sm hidden lg:block" 
                    :class="{ '!hidden': showDrawer, 'text-neutral-400 dark:text-neutral-500' : !searchQuery }">
                </span>
            </button>
            
            <div id="navigation">
            {% include "includes/navigation.html" %}
            </div>

            <div class="py-4 border-t border-neutral-200 dark:border-neutral-800 hidden lg:block" :class="{ '!hidden' : showDrawer }">
                <p class="text-neutral-400 dark:text-neutral-500 text-xs whitespace-nowrap">
                    © {% now "Y" %} KokKokKok
                </p>
            </div>
        </div>
    </nav>
    <side-drawer @click.outside="showDrawer = false; resetAll()" x-show="showDrawer" x-cloak class="fixed left-18 top-0 w-80 h-full border-l border-r border-neutral-200 dark:border-neutral-800 bg-white dark:bg-black"
                    x-transition:enter="transition duration-300 ease-out"
                    x-transition:enter-start="-translate-x-full opacity-0"
                    x-transition:enter-end="translate-x-0 opacity-100"
                    x-transition:leave="transition duration-200 ease-in"
                    x-transition:leave-start="translate-x-0 opacity-100"
                    x-transition:leave-end="-translate-x-full opacity-0"
                    >
        <div x-show="showSearch" class="relative px-2 py-5">
            <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute right-4 top-6 size-7 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 rounded-full flex items-center justify-center cursor-pointer">
                <div class="size-4">
                    <svg viewBox="0 0 48 48">
                        <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
                    </svg>
                </div>
            </button>
            {% include 'a_search/search.html' %}
        </div>
        <div x-show="showActivity" class="relative px-2 py-5 h-screen flex flex-col">
            <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute right-4 top-6 size-7 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 rounded-full flex items-center justify-center cursor-pointer">
                <div class="size-4">
                    <svg viewBox="0 0 48 48">
                        <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
                    </svg>
                </div>
            </button>
            <h2 class="pl-3 mb-7">การแจ้งเตือน</h2>
            <div id="notification-content" class="flex-1 overflow-y-auto overscroll-contain hide-scrollbar"></div>
        </div>
        <div x-show="showMessages" class="relative px-2 py-5 h-screen flex flex-col">
            <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute right-4 top-6 size-7 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 rounded-full flex items-center justify-center cursor-pointer">
                <div class="size-4">
                    <svg viewBox="0 0 48 48">
                        <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
                    </svg>
                </div>
            </button>
            <h2 class="pl-3 mb-7">คู่สนทนา</h2>
            <div id="messages-content" class="flex-1 overflow-y-auto overscroll-contain hide-scrollbar"></div>
        </div>
        <div x-show="showMore" class="relative px-2 py-5">
            <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute right-4 top-6 size-7 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 rounded-full flex items-center justify-center cursor-pointer">
                <div class="size-4">
                    <svg viewBox="0 0 48 48">
                        <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
                    </svg>
                </div>
            </button>
            <h2 class="pl-3 mb-7">อื่นๆ</h2>
            <ul class="flex flex-col gap-1">
                <li>
                    <button @click="resetAll(); showColorModes = true" class="button-rounded dark:hover:!bg-neutral-800">
                        <span class="font-medium">โหมดกลางคืน</span>
                        <div class="size-4 fill-neutral-400">
                            <svg viewBox="0 0 48 48">
                                <path d="M28.74 24 15.08 10.33a1 1 0 0 1 0-1.41l1.84-1.84a1 1 0 0 1 1.41 0L34.54 23.3a1 1 0 0 1 0 1.42l-16.2 16.21a1 1 0 0 1-1.42 0l-1.84-1.84a1 1 0 0 1 0-1.41L28.74 24Z"></path>
                            </svg>
                        </div>
                    </button>
                </li>
                <li>
                    <a href="{% url 'settings' %}" class="button-rounded dark:hover:!bg-neutral-800">
                        <span class="font-medium">ตั้งค่า</span>
                    </a>
                </li>
                <li>
                    <form method="post" action="{% url 'account_logout' %}" >
                        {% csrf_token %}
                        <button type="submit" class="button-rounded dark:hover:!bg-neutral-800">
                            <span class="font-medium">ล็อกเอ้าท์</span>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
        <div x-show="showColorModes" class="relative px-2 py-5">
            <div class="flex items-center mb-7 pl-2">
                <button @click="resetAll(); showMore = true" class="size-6 rounded-full bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 flex items-center justify-center cursor-pointer">
                    <div class="size-3 fill-neutral-700 dark:fill-white">
                        <svg viewBox="0 0 48 48">
                            <path d="m19.26 24 13.66-13.67a1 1 0 0 0 0-1.41l-1.84-1.84a1 1 0 0 0-1.41 0L13.46 23.3a1 1 0 0 0 0 1.42l16.2 16.21a1 1 0 0 0 1.42 0l1.84-1.84a1 1 0 0 0 0-1.41L19.26 24Z"></path>
                        </svg>
                    </div>
                </button>
                <h2 class="pl-3">Dark mode</h2>
            </div>
            <ul class="flex flex-col gap-1">
                <li>
                    <button @click="darkMode = true" 
                            hx-get="{% url 'settings' %}?darkmode=true"
                            hx-swap="none"
                            class="button-rounded dark:hover:!bg-neutral-800">
                            <span class="font-medium">Dark mode</span>
                            <div x-show="darkMode" class="size-3.5">
                                <svg viewBox="0 0 48 48">
                                    <path d="M43 6.08c.7.45 1.06.67 1.25.98.16.27.23.59.2.9-.03.36-.26.72-.7 1.43L23.06 42.14a3.5 3.5 0 0 1-5.63.39L4.89 27.62c-.54-.64-.81-.96-.9-1.32a1.5 1.5 0 0 1 .09-.92c.14-.33.46-.6 1.1-1.14l1.69-1.42c.64-.54.96-.81 1.31-.9.3-.06.63-.04.92.09.34.14.6.46 1.15 1.1l9.46 11.25 18.11-28.7c.45-.72.68-1.07.99-1.26.27-.16.59-.23.9-.2.36.03.71.25 1.43.7L43 6.08Z"></path>
                                </svg>
                            </div>
                    </button>
                </li>
                <li>
                    <button @click="darkMode = false" 
                            hx-get="{% url 'settings' %}?darkmode=false"
                            hx-swap="none"
                            class="button-rounded dark:hover:!bg-neutral-800">
                            <span class="font-medium">Light mode</span>
                            <div x-show="!darkMode" class="size-3.5">
                                <svg viewBox="0 0 48 48">
                                    <path d="M43 6.08c.7.45 1.06.67 1.25.98.16.27.23.59.2.9-.03.36-.26.72-.7 1.43L23.06 42.14a3.5 3.5 0 0 1-5.63.39L4.89 27.62c-.54-.64-.81-.96-.9-1.32a1.5 1.5 0 0 1 .09-.92c.14-.33.46-.6 1.1-1.14l1.69-1.42c.64-.54.96-.81 1.31-.9.3-.06.63-.04.92.09.34.14.6.46 1.15 1.1l9.46 11.25 18.11-28.7c.45-.72.68-1.07.99-1.26.27-.16.59-.23.9-.2.36.03.71.25 1.43.7L43 6.08Z"></path>
                                </svg>
                            </div>
                    </button>
                </li>
            </ul>
        </div>
    </side-drawer>
</aside>

<script>
    function sidebarComponent() {
        return { 
            showDrawer: false,
            searchQuery: '',
            showSearch: false,
            showActivity: false,
            showMessages: false,
            showMore: false,
            showColorModes: false,
            resetAll() {
                this.showSearch = false;
                this.showActivity = false;
                this.showMessages = false,
                this.showMore = false;
                this.showColorModes = false;
            }
        }
    }

    // Hamburger menu functionality
    document.addEventListener('DOMContentLoaded', function() {
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebarContainer = document.getElementById('sidebarContainer');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        
        // Only add mobile functionality on mobile
        function isMobile() {
            return window.innerWidth <= 768;
        }
        
        function toggleSidebar() {
            if (!isMobile()) return;
            sidebarContainer.classList.toggle('open');
            hamburgerBtn.classList.toggle('active');
            sidebarOverlay.classList.toggle('visible');
            document.body.style.overflow = sidebarContainer.classList.contains('open') ? 'hidden' : '';
        }
        
        function closeSidebar() {
            if (!isMobile()) return;
            sidebarContainer.classList.remove('open');
            hamburgerBtn.classList.remove('active');
            sidebarOverlay.classList.remove('visible');
            document.body.style.overflow = '';
        }
        
        // Event listeners
        hamburgerBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
        
        // Close sidebar when a navigation link is clicked
        document.querySelectorAll('#navigation button, #search').forEach(btn => {
            btn.addEventListener('click', function() {
                if (isMobile() && this.closest('#navigation')) {
                    setTimeout(closeSidebar, 200);
                }
            });
        });
        
        // Handle window resize
        window.addEventListener('resize', function() {
            if (!isMobile()) {
                closeSidebar();
                sidebarContainer.classList.remove('open');
                hamburgerBtn.classList.remove('active');
                sidebarOverlay.classList.remove('visible');
                document.body.style.overflow = '';
            }
        });
        
        // Also close when clicking any link inside navigation
        document.querySelectorAll('#navigation a, #navigation button').forEach(el => {
            el.addEventListener('click', function() {
                if (isMobile()) {
                    setTimeout(closeSidebar, 250);
                }
            });
        });
    });
</script>
