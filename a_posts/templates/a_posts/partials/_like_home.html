<button hx-get="{% url 'like_post' post.uuid %}?home=true"
        hx-swap="outerHTML"
        id="like" class="cursor-pointer">
        <div class="button-article dark:!bg-neutral-800 hover:dark:!bg-neutral-900">
            <div class="size-10 {% if user in post.likes.all %}fill-rose-500{% endif %}">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2.5L14.5 8.5L21 9.2L16 14L17.5 20.5L12 17L6.5 20.5L8 14L3 9.2L9.5 8.5L12 2.5Z"/>
                </svg>
            </div>
        </div>
        <p class="font-bold text-xs dark:text-white text-black px-2 py-0.5 inline-block rounded-2xl dark:bg-neutral-700 bg-neutral-200 opacity-70">
            {{ post.likes.count }}
        </p>
</button>
